<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFusion 2023 - Registration</title>
    <style>
        body {
            font-family: 'Caveat', cursive;
            font-family: 'Source Sans 3', sans-serif;
            background-color: rgb(0, 0, 0); /* Cream white background color */
            text-align: center;
            margin: 0;
            padding: 10px;
            background-image: url('image.jpg');
            background-size: cover; /* Cover the entire container */
            background-position: center; /* Center the background image */
            background-repeat: no-repeat; /* Prevent background image repetition */
        }

        
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Full height of the viewport */
        }

        h1 {
            color: #fffdd0; /* Dark gray text color for the title */
            margin-bottom: 23px;
            font-size: 80px;
        }

        h2 {
            color: #fffdd0; /* Medium gray text color for the subheading */
            margin-bottom: 40px;
            font-family: 'Caveat', cursive;
            font-family: 'Pompiere', sans-serif;
        }

        p {
            color: #fffdd0; /* Light gray text color for instructions */
            margin-bottom: 20px;
            font-size: 18px;
            
        }

        button {
            padding: 15px 20px;
            margin: 8px;
            border-radius: 30px; /* Rounded corners for buttons */
            background-color: rgba(22, 53, 83, 0.7); /* Transparent green background color for buttons */
            color: #ffffff; /* White text color */
            font-size: 16px;
            font-family: 'Caveat', cursive;
            font-family: 'Source Code Pro', monospace;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background-color: rgb(19, 10, 90); /* Fully opaque darker green color on hover */
        }
    </style>
</head>
<body>
    <style>
         @font-face {
            font-family: 'Lovelo Line Light';
            font-style: normal;
            font-weight: normal;
            src: local('Lovelo Line Light'), url('Lovelo-LineLight.woff') format('woff');
            }
    </style>
    <div id="container">
        <h1 style="font-family:'Lovelo Line Light';font-weight:normal;font-size:60px">TechFusion 2023</h1>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Pompiere&family=Source+Code+Pro:wght@300&family=Source+Sans+3:wght@300&display=swap');
        </style>
        <h2>Where AI and Innovation Collide!</h2>

        <p>Click on the respective button to register for the events!</p>
        
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Source+Code+Pro:wght@300&family=Source+Sans+3:wght@300&display=swap');
        </style>
        <button onclick="debate()">Debate Competition</button>
        <button onclick="hackathon()">Hackathon</button>
    </div>

    <script>
        function debate() {
            window.location.href = 'https://forms.gle/bL7a3tuXqG8LwsUu7';
        }

        function hackathon() {
            window.location.href = 'https://forms.gle/pfQ1F3vuKaPVcLdV9';
        }
    </script>

</body>
</html>
